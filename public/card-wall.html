<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>и§Ҷйў‘иҒҡеҗҲеҚЎзүҮеў?/title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #ff6b35;
      --accent2: #ff9f1c;
      --text: #e8e8e8;
      --muted: #888;
      --overlay: rgba(0,0,0,0.85);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* в”Җв”Җв”Җ HEADER в”Җв”Җв”Җ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .search-bar {
      flex: 1;
      max-width: 420px;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px 8px 38px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .search-bar input:focus { border-color: var(--accent); }

    .search-bar svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .header-meta {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* в”Җв”Җв”Җ FILTER TABS в”Җв”Җв”Җ */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }

    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* в”Җв”Җв”Җ GRID в”Җв”Җв”Җ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 0 24px 80px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* в”Җв”Җв”Җ CARD в”Җв”Җв”Җ */
    .card {
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(255,107,53,0.25);
    }

    .card-thumb-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #111;
      overflow: hidden;
    }

    .card-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .35s ease;
    }

    .card:hover .card-thumb { transform: scale(1.05); }

    /* Play button overlay */
    .card-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      background: rgba(0,0,0,0.4);
      transition: opacity .25s;
    }

    .card:hover .card-play { opacity: 1; }

    .play-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,107,53,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transform: scale(0.85);
      transition: transform .2s;
    }

    .card:hover .play-icon { transform: scale(1); }

    .card-body { padding: 10px 12px 12px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      color: var(--accent2);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    /* в”Җв”Җв”Җ LOADING / EMPTY в”Җв”Җв”Җ */
    .status {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* в”Җв”Җв”Җ MODAL в”Җв”Җв”Җ */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--overlay);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
      animation: modalIn .25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      font-size: 18px;
      line-height: 1;
    }

    .modal-close:hover { background: var(--surface2); color: var(--text); }

    .modal-player {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .modal-player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .modal-footer {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-info { font-size: 12px; color: var(--muted); display: flex; gap: 16px; }

    .modal-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }

    .modal-open-btn:hover { opacity: 0.85; }

    /* в”Җв”Җв”Җ CONFIG PANEL в”Җв”Җв”Җ */
    .config-panel {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: var(--overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .config-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }

    .config-box h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .config-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    .config-input-wrap { position: relative; margin-bottom: 16px; }

    .config-input-wrap label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .config-input-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .config-input-wrap input:focus { border-color: var(--accent); }

    .config-save {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }

    .config-save:hover { opacity: 0.9; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 0 12px 60px; }
      header { padding: 0 12px; }
      .filter-bar { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- в”Җв”Җ CONFIG PANEL в”Җв”Җ -->
<div class="config-panel" id="configPanel">
  <div class="config-box">
    <h2>рҹҺ¬ и§Ҷйў‘иҒҡеҗҲеҚЎзүҮеў?/h2>
    <p>иҜ·иҫ“е…ҘдҪ зҡ?RSSHub жңҚеҠЎең°еқҖпјҲжң¬ең°жҲ–жңҚеҠЎеҷЁпјүпјҢдҝқеӯҳеҗҺиҮӘеҠЁеҠ иҪҪж•°жҚ®гҖ?/p>
    <div class="config-input-wrap">
      <label>RSSHub ең°еқҖ</label>
      <input type="text" id="rsshubBase" placeholder="http://localhost:1200" value="http://localhost:1200" />
    </div>
    <div class="config-input-wrap">
      <label>и·Ҝз”ұи·Ҝеҫ„</label>
      <input type="text" id="routePath" placeholder="/my-custom/91porn" value="/my-custom/91porn" />
    </div>
    <button class="config-save" onclick="saveConfig()">ејҖе§ӢдҪҝз”?вҶ?/button>
  </div>
</div>

<!-- в”Җв”Җ HEADER в”Җв”Җ -->
<header>
  <div class="logo">в–?еҚЎзүҮеў?/div>
  <div class="search-bar">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="жҗңзҙўи§Ҷйў‘ж ҮйўҳвҖ? oninput="filterCards()" />
  </div>
  <div class="header-meta" id="headerMeta">вҖ?/div>
</header>

<!-- в”Җв”Җ FILTER TABS в”Җв”Җ -->
<div class="filter-bar">
  <div class="tab active" onclick="switchTab(this, '')">рҹ”Ҙ йҰ–йЎө</div>
  <div class="tab" onclick="switchTab(this, 'top')">рҹ‘‘ жңҖзғ?/div>
  <div class="tab" onclick="switchTab(this, 'hot')">рҹ“Ҳ еҫ—еҲҶ</div>
  <div class="tab" onclick="switchTab(this, 'all')">рҹ“Ӯ е…ЁйғЁ</div>
  <div class="tab" onclick="openConfig()">вҡҷпёҸ и®ҫзҪ®</div>
</div>

<!-- в”Җв”Җ GRID в”Җв”Җ -->
<main class="grid" id="grid">
  <div class="status"><div class="spinner"></div><span>й…ҚзҪ®еҗҺеҠ иҪҪж•°жҚ®вҖ?/span></div>
</main>

<!-- в”Җв”Җ MODAL в”Җв”Җ -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">вҖ?/div>
      <button class="modal-close" onclick="closeModal()">вң?/button>
    </div>
    <div class="modal-player">
      <iframe id="modalIframe" src="" allowfullscreen referrerpolicy="no-referrer" allow="autoplay; fullscreen"></iframe>
    </div>
    <div class="modal-footer">
      <div class="modal-info" id="modalInfo"></div>
      <a class="modal-open-btn" id="modalOrigLink" href="#" target="_blank" rel="noopener">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        еҺҹз«ҷжҹҘзңӢ
      </a>
    </div>
  </div>
</div>

<script>
  // в”Җв”Җ STATE в”Җв”Җ
  let rsshubBase = localStorage.getItem('rsshubBase') || window.location.origin;
  let routePath  = localStorage.getItem('routePath')  || '/my-custom/91porn';
  let allItems   = [];
  let currentCategory = '';

  // в”Җв”Җ INIT в”Җв”Җ
  window.addEventListener('DOMContentLoaded', () => {
    if (rsshubBase) {
      document.getElementById('rsshubBase').value = rsshubBase;
      document.getElementById('routePath').value  = routePath;
      document.getElementById('configPanel').style.display = 'none';
      loadFeed();
    }
  });

  function saveConfig() {
    rsshubBase = document.getElementById('rsshubBase').value.trim().replace(/\/$/, '');
    routePath  = document.getElementById('routePath').value.trim();
    if (!rsshubBase) return alert('иҜ·иҫ“е…?RSSHub ең°еқҖ');
    localStorage.setItem('rsshubBase', rsshubBase);
    localStorage.setItem('routePath', routePath);
    document.getElementById('configPanel').style.display = 'none';
    loadFeed();
  }

  function openConfig() {
    document.getElementById('configPanel').style.display = 'flex';
  }

  // в”Җв”Җ TABS в”Җв”Җ
  function switchTab(el, category) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentCategory = category;
    // Rebuild path
    const basePath = '/my-custom/91porn';
    routePath = category ? `${basePath}/${category}` : basePath;
    loadFeed();
  }

  // в”Җв”Җ FETCH FEED в”Җв”Җ
  async function loadFeed() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="status"><div class="spinner"></div><span>жӯЈеңЁеҠ иҪҪи§Ҷйў‘еҲ—иЎЁвҖ?/span></div>';

    const url = `${rsshubBase}${routePath}.json`;
    try {
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allItems = data.items || [];
      document.getElementById('headerMeta').textContent = `е…?${allItems.length} дёӘи§Ҷйў‘`;
      renderCards(allItems);
    } catch (err) {
      grid.innerHTML = `<div class="status">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:#ff6b35">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <span>еҠ иҪҪеӨұиҙҘпј?{err.message}</span>
        <span style="font-size:12px">иҜ·зЎ®и®?RSSHub жӯЈеңЁиҝҗиЎҢпјҢдё”и·Ҝз”ұең°еқҖжӯЈзЎ®</span>
        <button onclick="loadFeed()" style="margin-top:8px;padding:8px 20px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;">йҮҚиҜ•</button>
      </div>`;
    }
  }

  // в”Җв”Җ RENDER в”Җв”Җ
  function renderCards(items) {
    const grid = document.getElementById('grid');
    if (!items.length) {
      grid.innerHTML = '<div class="status"><span>жҡӮж— и§Ҷйў‘ж•°жҚ®</span></div>';
      return;
    }

    grid.innerHTML = items.map((item, i) => {
      const extra  = item._extra || {};
      const cover  = extra.cover || item.image || item.banner_image || '';
      const views  = extra.views || 'вҖ?;
      const favs   = extra.favorites || 'вҖ?;
      const iframe = extra.iframe_url || '';
      const link   = item.url || item.link || '#';
      const title  = item.title || 'ж— ж Үйў?;
      const author = (item.authors && item.authors[0] && item.authors[0].name) || 'вҖ?;
      const timeStr = formatRelativeTime(item.date_published);

      return `<div class="card" onclick="openModal(${i})" id="card-${i}">
  <div class="card-thumb-wrap">
    ${cover ? `<img class="card-thumb" src="${cover}" referrerpolicy="no-referrer" loading="lazy" alt="${escHtml(title)}" onerror="this.style.display='none'"/>` : ''}
    <div class="card-play">
      <div class="play-icon">
        <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
      </div>
    </div>
    ${iframe ? '<div class="badge">в–?еҸҜж’ӯж”?/div>' : ''}
  </div>
  <div class="card-body">
    <div class="card-title" title="${escHtml(title)}">${escHtml(title)}</div>
    <div class="card-meta">
      <span>рҹ‘Ө ${escHtml(author)}</span>
      <span>рҹ•җ ${timeStr}</span>
      <span>рҹ”Ҙ ${escHtml(String(views))}</span>
      <span>вқӨпёҸ ${escHtml(String(favs))}</span>
    </div>
  </div>
</div>`;
    }).join('');
  }

  // в”Җв”Җ MODAL в”Җв”Җ
  function openModal(i) {
    const item   = allItems[i];
    const extra  = item._extra || {};
    const iframe = extra.iframe_url || '';
    const link   = item.url || item.link || '#';
    const author = (item.authors && item.authors[0] && item.authors[0].name) || 'вҖ?;

    document.getElementById('modalTitle').textContent = item.title || 'ж— ж Үйў?;
    document.getElementById('modalOrigLink').href = link;
    document.getElementById('modalInfo').innerHTML = `
      <span>рҹ‘Ө ${escHtml(author)}</span>
      <span>рҹ”Ҙ ${escHtml(String(extra.views || 'вҖ?))}</span>
      <span>вқӨпёҸ ${escHtml(String(extra.favorites || 'вҖ?))}</span>
    `;

    if (iframe) {
      document.getElementById('modalIframe').src = iframe;
    } else {
      window.open(link, '_blank');
      return;
    }

    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.getElementById('modalIframe').src = '';
    document.body.style.overflow = '';
  }

  function closeModalOnBackdrop(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // в”Җв”Җ SEARCH в”Җв”Җ
  function filterCards() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) { renderCards(allItems); return; }
    const filtered = allItems.filter(it => (it.title || '').toLowerCase().includes(q));
    renderCards(filtered);
  }

  // в”Җв”Җ HELPERS в”Җв”Җ
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatRelativeTime(dateStr) {
    if (!dateStr) return 'вҖ?;
    const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
    if (diff < 3600)   return Math.floor(diff / 60) + ' еҲҶеүҚ';
    if (diff < 86400)  return Math.floor(diff / 3600) + ' ж—¶еүҚ';
    if (diff < 604800) return Math.floor(diff / 86400) + ' еӨ©еүҚ';
    return new Date(dateStr).toLocaleDateString('zh-CN');
  }
</script>
</body>
</html>
